services:
  postgres-app:
    image: postgres:16-alpine
    container_name: insightflow-app-db
    environment:
      POSTGRES_DB: insightflow_app
      POSTGRES_USER: insightflow
      POSTGRES_PASSWORD: insightflow_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata-app:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U insightflow -d insightflow_app"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-warehouse:
    image: postgres:16-alpine
    container_name: insightflow-warehouse-db
    environment:
      POSTGRES_DB: insightflow_warehouse
      POSTGRES_USER: insightflow_wh
      POSTGRES_PASSWORD: insightflow_wh_pass
    volumes:
      - pgdata-warehouse:/var/lib/postgresql/data
      - ./data-engineering/warehouse/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U insightflow_wh -d insightflow_warehouse"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: insightflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: insightflow-backend
    ports:
      - "8080:8080"
    environment:
      DJANGO_SETTINGS_MODULE: insightflow.settings.prod
      DJANGO_SECRET_KEY: change-me-in-production-use-a-long-random-string
      DEBUG: "False"
      DB_HOST: postgres-app
      DB_PORT: "5432"
      DB_NAME: insightflow_app
      DB_USER: insightflow
      DB_PASSWORD: insightflow_pass
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres-app:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_data &&
             gunicorn --bind 0.0.0.0:8080 --workers 4 --timeout 120 insightflow.wsgi:application"

  etl:
    build:
      context: ./data-engineering
      dockerfile: Dockerfile
    container_name: insightflow-etl
    environment:
      DB_HOST: postgres-warehouse
      DB_PORT: "5432"
      DB_NAME: insightflow_warehouse
      DB_USER: insightflow_wh
      DB_PASSWORD: insightflow_wh_pass
      REDIS_URL: redis://redis:6379/1
    depends_on:
      postgres-warehouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python sample_data.py &&
             python create_star_schema.py &&
             python etl_pipeline.py"

volumes:
  pgdata-app:
  pgdata-warehouse:
  redis-data:
