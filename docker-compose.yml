services:
  postgres-app:
    image: postgres:16-alpine
    container_name: insightflow-app-db
    environment:
      POSTGRES_DB: insightflow_app
      POSTGRES_USER: insightflow
      POSTGRES_PASSWORD: insightflow_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata-app:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U insightflow -d insightflow_app"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-warehouse:
    image: postgres:16-alpine
    container_name: insightflow-warehouse-db
    environment:
      POSTGRES_DB: insightflow_warehouse
      POSTGRES_USER: insightflow_wh
      POSTGRES_PASSWORD: insightflow_wh_pass
    volumes:
      - pgdata-warehouse:/var/lib/postgresql/data
      - ./data-engineering/warehouse/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U insightflow_wh -d insightflow_warehouse"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: insightflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: insightflow-frontend:${DEPLOY_TAG:-local}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080/api}
    container_name: insightflow-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    image: insightflow-backend:${DEPLOY_TAG:-local}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: insightflow-backend
    ports:
      - "8080:8080"
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-insightflow.settings.prod}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-production}
      DEBUG: ${DEBUG:-False}
      DB_HOST: ${DB_HOST:-postgres-app}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-insightflow_app}
      DB_USER: ${DB_USER:-insightflow}
      DB_PASSWORD: ${DB_PASSWORD:-insightflow_pass}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MEDIA_ROOT: ${MEDIA_ROOT:-/app/media}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-True}
    volumes:
      - media-data:/app/media
    depends_on:
      postgres-app:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_data &&
             gunicorn --bind 0.0.0.0:8080 --workers 4 --timeout 120 insightflow.wsgi:application"

  celery-worker:
    image: insightflow-backend:${DEPLOY_TAG:-local}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: insightflow-celery-worker
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-insightflow.settings.prod}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-production}
      DEBUG: ${DEBUG:-False}
      DB_HOST: ${DB_HOST:-postgres-app}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-insightflow_app}
      DB_USER: ${DB_USER:-insightflow}
      DB_PASSWORD: ${DB_PASSWORD:-insightflow_pass}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MEDIA_ROOT: ${MEDIA_ROOT:-/app/media}
    volumes:
      - media-data:/app/media
    depends_on:
      postgres-app:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    command: celery -A insightflow worker --loglevel=info --concurrency=2

  etl:
    image: insightflow-etl:${DEPLOY_TAG:-local}
    build:
      context: ./data-engineering
      dockerfile: Dockerfile
    container_name: insightflow-etl
    env_file: .env
    environment:
      DB_HOST: ${WAREHOUSE_DB_HOST:-postgres-warehouse}
      DB_PORT: ${WAREHOUSE_DB_PORT:-5432}
      DB_NAME: ${WAREHOUSE_DB_NAME:-insightflow_warehouse}
      DB_USER: ${WAREHOUSE_DB_USER:-insightflow_wh}
      DB_PASSWORD: ${WAREHOUSE_DB_PASSWORD:-insightflow_wh_pass}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/1}
    depends_on:
      redis:
        condition: service_healthy
    command: >
      sh -c "python create_star_schema.py &&
             python etl_pipeline.py"

  # ── Event-driven ETL ────────────────────────────────────────────────────────
  # Watches the OLTP source DB for new data via PostgreSQL NOTIFY.
  # On notification: debounces for ETL_DEBOUNCE_SECONDS then dispatches
  # run_etl_task to the Celery queue.  Starts by installing the DB triggers.
  etl-listener:
    image: insightflow-etl:${DEPLOY_TAG:-local}
    build:
      context: ./data-engineering
      dockerfile: Dockerfile
    container_name: insightflow-etl-listener
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/1
      ETL_DEBOUNCE_SECONDS: "300"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: >
      sh -c "python trigger_setup.py install &&
             python -m etl.listener"

  # Celery worker — picks up run_etl_task from the Redis queue and executes
  # the incremental ETL pipeline (OLTP → quality checks → OLAP warehouse).
  etl-worker:
    image: insightflow-etl:${DEPLOY_TAG:-local}
    build:
      context: ./data-engineering
      dockerfile: Dockerfile
    container_name: insightflow-etl-worker
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: >
      celery -A celery_app worker
             --loglevel=info
             --queues=etl
             --concurrency=1

  metabase:
    image: metabase/metabase:latest
    container_name: insightflow-metabase
    ports:
      - "3001:3000"
    depends_on:
      postgres-warehouse:
        condition: service_healthy
    restart: unless-stopped

  metabase-setup:
    image: insightflow-etl:${DEPLOY_TAG:-local}
    build:
      context: ./data-engineering
      dockerfile: Dockerfile
    container_name: insightflow-metabase-setup
    env_file: .env
    depends_on:
      postgres-warehouse:
        condition: service_healthy
      metabase:
        condition: service_started
    restart: "no"
    command: >
      sh -c "cd data-engineering/metabase_setup && python metabase_setup.py"

volumes:
  pgdata-app:
  pgdata-warehouse:
  redis-data:
  media-data:
