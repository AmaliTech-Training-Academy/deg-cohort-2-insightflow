services:
  redis:
    image: redis:7-alpine
    container_name: insightflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: insightflow-backend
    ports:
      - "8080:8080"
    environment:
      DJANGO_SETTINGS_MODULE: insightflow.settings.prod
      DJANGO_SECRET_KEY: change-me-in-production-use-a-long-random-string
      DEBUG: "False"
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      SECURE_SSL_REDIRECT: "False"
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_URL: ${REDIS_URL}
      MEDIA_ROOT: /app/media
    volumes:
      - media-data:/app/media
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; socket.create_connection(('localhost', 8080), timeout=5).close()\""]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_data &&
             gunicorn --bind 0.0.0.0:8080 --workers 4 --timeout 120 insightflow.wsgi:application"

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: insightflow-celery-worker
    environment:
      DJANGO_SETTINGS_MODULE: insightflow.settings.prod
      DJANGO_SECRET_KEY: change-me-in-production-use-a-long-random-string
      DEBUG: "False"
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_URL: ${REDIS_URL}
      MEDIA_ROOT: /app/media
    volumes:
      - media-data:/app/media
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    command: celery -A insightflow worker --loglevel=info --concurrency=2

  etl:
    build:
      context: ./data-engineering
      dockerfile: Dockerfile
    container_name: insightflow-etl
    environment:
      # Source — OLTP app database
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      # Target — data warehouse
      WAREHOUSE_DB_HOST: ${WAREHOUSE_DB_HOST}
      WAREHOUSE_DB_PORT: ${WAREHOUSE_DB_PORT}
      WAREHOUSE_DB_NAME: ${WAREHOUSE_DB_NAME}
      WAREHOUSE_DB_USER: ${WAREHOUSE_DB_USER}
      WAREHOUSE_DB_PASSWORD: ${WAREHOUSE_DB_PASSWORD}
      REDIS_URL: ${REDIS_URL}
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    command: >
      sh -c "python sample_data.py &&
             python create_star_schema.py &&
             python etl_pipeline.py"

volumes:
  redis-data:
  media-data:
