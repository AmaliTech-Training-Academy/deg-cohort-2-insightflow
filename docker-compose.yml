services:
  postgres-app:
    image: postgres:16-alpine
    container_name: insightflow-app-db
    environment:
      POSTGRES_DB: insightflow_app
      POSTGRES_USER: insightflow
      POSTGRES_PASSWORD: insightflow_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata-app:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U insightflow -d insightflow_app"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-warehouse:
    image: postgres:16-alpine
    container_name: insightflow-warehouse-db
    environment:
      POSTGRES_DB: insightflow_warehouse
      POSTGRES_USER: insightflow_wh
      POSTGRES_PASSWORD: insightflow_wh_pass
    ports:
      - "5433:5432"
    volumes:
      - pgdata-warehouse:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U insightflow_wh -d insightflow_warehouse"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: insightflow-backend
    ports:
      - "8080:8080"
    environment:
      DJANGO_SETTINGS_MODULE: insightflow.settings.prod
      DJANGO_SECRET_KEY: change-me-in-production-use-a-long-random-string
      DEBUG: "False"
      DB_HOST: postgres-app
      DB_PORT: "5432"
      DB_NAME: insightflow_app
      DB_USER: insightflow
      DB_PASSWORD: insightflow_pass
    depends_on:
      postgres-app:
        condition: service_healthy

  # ── One-shot init: creates star-schema DDL then exits ────────────────────────
  # Does NOT depend on the local postgres-warehouse service so it works
  # unchanged in production against AWS RDS — connection credentials are
  # supplied via .env (WAREHOUSE_DB_*).  The retry loop in
  # create_star_schema.py handles any transient start-up delay.
  schema-init:
    build:
      context: ./data-engineering
      dockerfile: Dockerfile
    container_name: insightflow-schema-init
    env_file:
      - .env
    command: python create_star_schema.py
    restart: "no"

  # ── ETL pipeline: runs after schema-init exits successfully ──────────────────
  etl-pipeline:
    build:
      context: ./data-engineering
      dockerfile: Dockerfile
    container_name: insightflow-etl
    env_file:
      - .env
    depends_on:
      schema-init:
        condition: service_completed_successfully
    command: python etl_pipeline.py
    restart: "no"

volumes:
  pgdata-app:
  pgdata-warehouse:
