services:
  postgres-app:
    image: postgres:15-alpine
    container_name: insightflow-postgres-app
    environment:
      POSTGRES_DB: ${DB_NAME:-insightflow_app}
      POSTGRES_USER: ${DB_USER:-insightflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-insightflow_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres-app-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-insightflow} -d ${DB_NAME:-insightflow_app}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-warehouse:
    image: postgres:15-alpine
    container_name: insightflow-postgres-warehouse
    environment:
      POSTGRES_DB: ${WAREHOUSE_DB_NAME:-insightflow_warehouse}
      POSTGRES_USER: ${WAREHOUSE_DB_USER:-insightflow_wh}
      POSTGRES_PASSWORD: ${WAREHOUSE_DB_PASSWORD:-insightflow_wh_pass}
    ports:
      - "5433:5432"
    volumes:
      - postgres-warehouse-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${WAREHOUSE_DB_USER:-insightflow_wh} -d ${WAREHOUSE_DB_NAME:-insightflow_warehouse}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: insightflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: insightflow-frontend:${DEPLOY_TAG:-local}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080/api}
    container_name: insightflow-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    logging:
      driver: awslogs
      options:
        awslogs-region: eu-west-1
        awslogs-group: /insightflow/dev/frontend
        awslogs-stream: frontend
        awslogs-create-group: "true"
    restart: unless-stopped

  backend:
    image: insightflow-backend:${DEPLOY_TAG:-local}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: insightflow-backend
    ports:
      - "8080:8080"
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-insightflow.settings.prod}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-production}
      DEBUG: ${DEBUG:-False}
      DB_HOST: ${DB_HOST:-postgres-app}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-insightflow_app}
      DB_USER: ${DB_USER:-insightflow}
      DB_PASSWORD: ${DB_PASSWORD:-insightflow_pass}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MEDIA_ROOT: ${MEDIA_ROOT:-/app/media}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-True}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
    volumes:
      - media-data:/app/media
    depends_on:
      redis:
        condition: service_healthy
      postgres-app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; socket.create_connection(('localhost', 8080), timeout=5).close()\""]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 300s
    logging:
      driver: awslogs
      options:
        awslogs-region: eu-west-1
        awslogs-group: /insightflow/dev/backend
        awslogs-stream: backend
        awslogs-create-group: "true"
    command: >
      sh -c "python manage.py migrate &&
             gunicorn --bind 0.0.0.0:8080 --workers 4 --timeout 120 insightflow.wsgi:application"

  celery-worker:
    image: insightflow-backend:${DEPLOY_TAG:-local}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: insightflow-celery-worker
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-insightflow.settings.prod}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-production}
      DEBUG: ${DEBUG:-False}
      DB_HOST: ${DB_HOST:-postgres-app}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-insightflow_app}
      DB_USER: ${DB_USER:-insightflow}
      DB_PASSWORD: ${DB_PASSWORD:-insightflow_pass}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MEDIA_ROOT: ${MEDIA_ROOT:-/app/media}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
    volumes:
      - media-data:/app/media
    depends_on:
      redis:
        condition: service_healthy
      postgres-app:
        condition: service_healthy
      backend:
        condition: service_started
    logging:
      driver: awslogs
      options:
        awslogs-region: eu-west-1
        awslogs-group: /insightflow/dev/celery-worker
        awslogs-stream: celery-worker
        awslogs-create-group: "true"
    command: celery -A insightflow worker --loglevel=info --concurrency=2

  etl:
    image: insightflow-etl:${DEPLOY_TAG:-local}
    build:
      context: ./data-engineering
      dockerfile: Dockerfile
    container_name: insightflow-etl
    env_file: .env
    environment:
      # Source — OLTP app database
      DB_HOST: ${DB_HOST:-postgres-app}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-insightflow_app}
      DB_USER: ${DB_USER:-insightflow}
      DB_PASSWORD: ${DB_PASSWORD:-insightflow_pass}
      # Target — data warehouse
      WAREHOUSE_DB_HOST: ${WAREHOUSE_DB_HOST:-postgres-warehouse}
      WAREHOUSE_DB_PORT: ${WAREHOUSE_DB_PORT:-5432}
      WAREHOUSE_DB_NAME: ${WAREHOUSE_DB_NAME:-insightflow_warehouse}
      WAREHOUSE_DB_USER: ${WAREHOUSE_DB_USER:-insightflow_wh}
      WAREHOUSE_DB_PASSWORD: ${WAREHOUSE_DB_PASSWORD:-insightflow_wh_pass}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ETL_BATCH_SIZE: ${ETL_BATCH_SIZE:-1000}
    depends_on:
      redis:
        condition: service_healthy
      postgres-app:
        condition: service_healthy
      postgres-warehouse:
        condition: service_healthy
      backend:
        condition: service_healthy
    logging:
      driver: awslogs
      options:
        awslogs-region: eu-west-1
        awslogs-group: /insightflow/dev/etl
        awslogs-stream: etl
        awslogs-create-group: "true"
    command: python etl_pipeline.py

  etl-listener:
    image: insightflow-etl:${DEPLOY_TAG:-local}
    build:
      context: ./data-engineering
      dockerfile: Dockerfile
    container_name: insightflow-etl-listener
    environment:
      DB_HOST: ${DB_HOST:-postgres-app}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-insightflow_app}
      DB_USER: ${DB_USER:-insightflow}
      DB_PASSWORD: ${DB_PASSWORD:-insightflow_pass}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/1}
      ETL_DEBOUNCE_SECONDS: ${ETL_DEBOUNCE_SECONDS:-300}
    depends_on:
      redis:
        condition: service_healthy
      postgres-app:
        condition: service_healthy
    logging:
      driver: awslogs
      options:
        awslogs-region: eu-west-1
        awslogs-group: /insightflow/dev/etl-listener
        awslogs-stream: etl-listener
        awslogs-create-group: "true"
    restart: unless-stopped
    command: >
      sh -c "python trigger_setup.py install &&
             python -m etl.listener"

  etl-worker:
    image: insightflow-etl:${DEPLOY_TAG:-local}
    build:
      context: ./data-engineering
      dockerfile: Dockerfile
    container_name: insightflow-etl-worker
    environment:
      DB_HOST: ${WAREHOUSE_DB_HOST:-postgres-warehouse}
      DB_PORT: ${WAREHOUSE_DB_PORT:-5432}
      DB_NAME: ${WAREHOUSE_DB_NAME:-insightflow_warehouse}
      DB_USER: ${WAREHOUSE_DB_USER:-insightflow_wh}
      DB_PASSWORD: ${WAREHOUSE_DB_PASSWORD:-insightflow_wh_pass}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/1}
    depends_on:
      redis:
        condition: service_healthy
      postgres-warehouse:
        condition: service_healthy
    logging:
      driver: awslogs
      options:
        awslogs-region: eu-west-1
        awslogs-group: /insightflow/dev/etl-worker
        awslogs-stream: etl-worker
        awslogs-create-group: "true"
    restart: unless-stopped
    command: >
      celery -A celery_app worker
             --loglevel=info
             --queues=etl
             --concurrency=1

  # ── Metabase ──────────────────────────────────────────────────────────────────
  # Analytics/BI layer — warehouse DB is external (RDS), configured via .env.
  # metabase-setup runs once to register the data source, then exits.
  metabase:
    image: metabase/metabase:latest
    container_name: insightflow-metabase
    ports:
      - "3001:3000"
    environment:
      MB_DB_TYPE: h2
    volumes:
      - metabase-data:/metabase-data
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  metabase-setup:
    image: insightflow-etl:${DEPLOY_TAG:-local}
    build:
      context: ./data-engineering
      dockerfile: Dockerfile
    container_name: insightflow-metabase-setup
    env_file: .env
    environment:
      METABASE_URL: http://metabase:3000
    depends_on:
      metabase:
        condition: service_healthy
    restart: "no"
    command: >
      sh -c "cd metabase_setup && python metabase_setup.py"

volumes:
  pgdata-app:
  pgdata-warehouse:
  redis-data:
  media-data:
  metabase-data:
  postgres-app-data:
  postgres-warehouse-data:
