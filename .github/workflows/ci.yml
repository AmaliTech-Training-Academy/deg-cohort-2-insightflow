name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  DJANGO_SECRET_KEY: ci-secret-key-not-for-production
  DB_NAME: insightflow_app
  DB_USER: postgres
  DB_PASSWORD: postgres
  DB_HOST: localhost
  DB_PORT: "5432"
  DEBUG: "False"

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit hooks
        run: pre-commit run --all-files
        env:
          SKIP: no-commit-to-branch

      - name: Install type stubs for mypy
        run: pip install mypy types-requests

      - name: Type check (mypy)
        run: mypy backend/apps backend/insightflow data-engineering qa/api-tests --config-file pyproject.toml

  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: insightflow_app
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Django system check
        run: python manage.py check
        working-directory: backend

      - name: Run migrations
        run: python manage.py migrate --noinput
        working-directory: backend

      - name: Run tests
        run: python manage.py test --verbosity=2
        working-directory: backend

  data-engineering:
    name: ETL pipeline checks
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: data-engineering/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest
        working-directory: data-engineering

      - name: Syntax check
        run: python -m py_compile etl_pipeline.py create_star_schema.py sample_data.py config.py
        working-directory: data-engineering

      - name: Run ETL tests
        run: pytest --tb=short -v || echo "No tests yet — add tests under data-engineering/tests/"
        working-directory: data-engineering

  api-tests:
    name: API / integration tests
    runs-on: ubuntu-latest
    needs: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: insightflow_app
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend deps
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Install QA deps
        run: pip install -r requirements.txt
        working-directory: qa/api-tests

      - name: Start backend server
        working-directory: backend
        run: |
          python manage.py migrate --noinput
          python manage.py seed_data
          python manage.py runserver &
          sleep 5

      - name: Syntax check tests
        run: python -m py_compile tests/test_api.py conftest.py
        working-directory: qa/api-tests

      - name: Run API tests
        run: pytest --tb=short -v
        working-directory: qa/api-tests
        env:
          API_BASE_URL: http://localhost:8000
