name: CI

# ─────────────────────────────────────────────────────────────────────────────
# SOURCE OF TRUTH: devops/.github/workflows/ci.yml
# Mirror:          .github/workflows/ci.yml  (read by GitHub Actions)
# Keep both files identical. Edit here, then copy to .github/workflows/.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Path detection ──────────────────────────────────────────────────────────
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend:          ${{ steps.filter.outputs.backend }}
      data_engineering: ${{ steps.filter.outputs.data_engineering }}
      qa:               ${{ steps.filter.outputs.qa }}
      docker:           ${{ steps.filter.outputs.docker }}
      devops:           ${{ steps.filter.outputs.devops }}
      infrastructure:   ${{ steps.filter.outputs.infrastructure }}
      infra_tests:      ${{ steps.filter.outputs.infra_tests }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            data_engineering:
              - 'data-engineering/**'
            qa:
              - 'qa/api-tests/**'
            docker:
              - 'backend/Dockerfile'
              - 'backend/requirements.txt'
              - 'frontend/Dockerfile'
              - 'frontend/package.json'
            devops:
              - 'devops/**'
              - 'pyproject.toml'
              - '.pre-commit-config.yaml'
            infrastructure:
              - 'devops/infra/**'
            infra_tests:
              - 'devops/infra/**'
              - 'qa/infra-tests/**'

  # ── Always run ──────────────────────────────────────────────────────────────
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit hooks
        run: pre-commit run --all-files
        env:
          SKIP: no-commit-to-branch

      - name: Install type stubs for mypy
        run: pip install mypy types-requests

      - name: Type check (mypy)
        run: mypy backend/apps backend/insightflow data-engineering qa/api-tests --config-file pyproject.toml

  security:
    name: Security scan
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(gh release view --repo gitleaks/gitleaks --json tagName -q .tagName | sed 's/^v//')
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/
          gitleaks version

      - name: Scan for secrets
        run: gitleaks detect --source . --redact --verbose

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies
        run: |
          pip-audit -r backend/requirements.txt
          pip-audit -r data-engineering/requirements.txt
          pip-audit -r qa/api-tests/requirements.txt

  # ── Path-gated jobs ─────────────────────────────────────────────────────────
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    needs: [lint, changes]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.devops == 'true'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: insightflow_app
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
      DB_NAME: insightflow_app
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: "5432"
      DEBUG: "False"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest-django pytest-cov
        working-directory: backend

      - name: Django system check
        run: python manage.py check
        working-directory: backend

      - name: Run migrations
        run: python manage.py migrate --noinput
        working-directory: backend

      - name: Run tests with coverage
        run: pytest --cov=apps --cov-report=term-missing --tb=short -v || [ $? -eq 5 ]
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: insightflow.settings

  data-engineering:
    name: ETL pipeline checks
    runs-on: ubuntu-latest
    needs: [lint, changes]
    if: needs.changes.outputs.data_engineering == 'true' || needs.changes.outputs.devops == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: data-engineering/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest
        working-directory: data-engineering

      - name: Syntax check
        run: python -m py_compile etl_pipeline.py create_star_schema.py sample_data.py config.py
        working-directory: data-engineering

      - name: Run ETL tests
        run: pytest --tb=short -v || echo "No tests yet — add tests under data-engineering/tests/"
        working-directory: data-engineering

  api-tests:
    name: API / integration tests
    runs-on: ubuntu-latest
    needs: [lint, backend, changes]
    if: |
      always() &&
      needs.lint.result == 'success' &&
      (needs.backend.result == 'success' || needs.backend.result == 'skipped') &&
      (
        needs.changes.outputs.backend == 'true' ||
        needs.changes.outputs.qa == 'true' ||
        needs.changes.outputs.devops == 'true'
      )

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: insightflow_app
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
      DB_NAME: insightflow_app
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: "5432"
      DEBUG: "False"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend deps
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Install QA deps
        run: pip install -r requirements.txt
        working-directory: qa/api-tests

      - name: Run migrations and seed data
        run: |
          python manage.py migrate --noinput
          python manage.py seed_data
        working-directory: backend

      - name: Start backend server
        run: gunicorn insightflow.wsgi:application --bind 0.0.0.0:8000 --daemon --workers 2
        working-directory: backend

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:8000/api-docs/ && break
            echo "Waiting for server... ($i/15)"
            sleep 2
          done

      - name: Syntax check tests
        run: python -m py_compile tests/test_api.py conftest.py
        working-directory: qa/api-tests

      - name: Run API tests
        run: pytest --tb=short -v
        working-directory: qa/api-tests
        env:
          API_BASE_URL: http://localhost:8000

  docker:
    name: Docker build & scan
    runs-on: ubuntu-latest
    needs: [lint, changes]
    if: needs.changes.outputs.docker == 'true' || needs.changes.outputs.devops == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t insightflow-backend:ci ./backend

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: insightflow-backend:ci
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true

      - name: Build frontend Docker image
        run: docker build -t insightflow-frontend:ci ./frontend

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: insightflow-frontend:ci
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true

  infrastructure:
    name: Infrastructure checks
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.infrastructure == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.7"

      # ── Format ────────────────────────────────────────────────────────────
      - name: Terraform format check
        run: terraform fmt -check -recursive devops/infra/

      # ── Validate environments (no backend, no AWS creds needed) ───────────
      - name: Validate dev environment
        run: |
          cd devops/infra/environments/dev
          terraform init -backend=false
          terraform validate

      - name: Validate prod environment
        run: |
          cd devops/infra/environments/prod
          terraform init -backend=false
          terraform validate

      # ── Module unit tests (mock_provider — no AWS creds needed) ───────────
      - name: Test security-groups module
        run: |
          cd devops/infra/modules/security-groups
          terraform init
          terraform test

      - name: Test vpc module
        run: |
          cd devops/infra/modules/vpc
          terraform init
          terraform test

      # ── Security scanning ─────────────────────────────────────────────────
      - name: tfsec — Terraform security scanner
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: devops/infra/
          soft_fail: true

      - name: Checkov — policy-as-code security scan
        run: |
          pip install checkov
          checkov -d devops/infra/ --quiet --compact \
            --skip-check CKV_AWS_17 \
            --skip-check CKV_AWS_273 \
            --skip-check CKV_AWS_40 \
            --skip-check CKV2_AWS_31 \
            --skip-check CKV_AWS_88 \
            --skip-check CKV_AWS_24 \
            --skip-check CKV_AWS_293 \
            --skip-check CKV_AWS_260 \
            --skip-check CKV_AWS_382 \
            --skip-check CKV2_AWS_5 \
            --skip-check CKV_AWS_2 \
            --skip-check CKV_AWS_103 \
            --skip-check CKV2_AWS_20 \
            --skip-check CKV_AWS_378 \
            --skip-check CKV_AWS_136 \
            --skip-check CKV_AWS_51 \
            --skip-check CKV_AWS_157 \
            --skip-check CKV2_AWS_50 \
            --skip-check CKV_AWS_144 \
            --skip-check CKV_AWS_145 \
            --skip-check CKV_AWS_21 \
            --skip-check CKV_AWS_18 \
            --skip-check CKV2_AWS_61 \
            --skip-check CKV_AWS_158 \
            --skip-check CKV_AWS_338 \
            --skip-check CKV_AWS_191 \
            --skip-check CKV2_AWS_57 \
            --skip-check CKV_AWS_354 \
            --skip-check CKV_AWS_353 \
            --skip-check CKV2_AWS_69 \
            --skip-check CKV2_AWS_76 \
            --skip-check CKV_AWS_150 \
            --skip-check CKV_AWS_31 \
            --skip-check CKV_AWS_118 \
            --skip-check CKV_AWS_149 \
            --skip-check CKV2_AWS_62

  infra-tests:
    name: Infrastructure QA tests
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.infra_tests == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.7"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: qa/infra-tests/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: qa/infra-tests

      - name: Run infra QA tests
        run: pytest --tb=short -v
        working-directory: qa/infra-tests

  # ── Workflow sync check ──────────────────────────────────────────────────────
  workflow-sync:
    name: Workflow files in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify devops/ and .github/ workflow files are identical
        run: |
          FAILED=0
          for WORKFLOW in ci.yml deploy-dev.yml deploy-prod.yml; do
            SRC="devops/.github/workflows/$WORKFLOW"
            DST=".github/workflows/$WORKFLOW"
            if ! diff -q "$SRC" "$DST" > /dev/null 2>&1; then
              echo "ERROR: $SRC and $DST differ."
              diff "$SRC" "$DST" || true
              FAILED=1
            else
              echo "OK: $WORKFLOW is in sync"
            fi
          done
          if [ "$FAILED" -ne 0 ]; then
            echo ""
            echo "Source of truth is devops/.github/workflows/."
            echo "Edit there, then copy to .github/workflows/."
            exit 1
          fi

  # ── Required status check for branch protection ──────────────────────────────
  ci-passed:
    name: CI passed
    runs-on: ubuntu-latest
    needs:
      - lint
      - security
      - backend
      - data-engineering
      - api-tests
      - docker
      - infrastructure
      - infra-tests
      - workflow-sync
    if: always()
    steps:
      - name: Check all jobs passed or were skipped
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" || \
                "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more jobs failed or were cancelled"
            exit 1
          fi
          echo "All jobs passed or were intentionally skipped"
