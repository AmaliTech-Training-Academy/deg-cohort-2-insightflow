name: Deploy → Prod

# ─────────────────────────────────────────────────────────────────────────────
# SOURCE OF TRUTH: devops/.github/workflows/deploy-prod.yml
# Mirror:          .github/workflows/deploy-prod.yml  (read by GitHub Actions)
# Keep both files identical. Edit here, then copy to .github/workflows/.
# ─────────────────────────────────────────────────────────────────────────────

# Triggers only after CI passes on main.
#
# Pipeline:
#   ci-gate ──► plan ──► approve ──► apply ──► deploy ──► summary
#                   (manual gate via "production" GitHub Environment)
#
# Reviewers see the Terraform plan summary before approving.
# The deploy itself builds Docker images on the EC2 instance — no registry.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-prod
  cancel-in-progress: false   # never abort an in-flight deploy

permissions:
  id-token: write   # OIDC → AWS assume-role
  contents: read

env:
  AWS_REGION:    ap-southeast-1
  TF_DIR:        devops/infra/environments/prod
  ENV_CONFIG:    devops/scripts/envs/prod.env
  DEPLOY_SCRIPT: devops/scripts/zero-downtime-deploy.sh
  SSM_WAIT:      devops/scripts/ssm-wait.sh

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── Guard ────────────────────────────────────────────────────────────────────
  ci-gate:
    name: CI gate
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - run: echo "CI passed on ${{ github.event.workflow_run.head_sha }} — starting prod pipeline"

  # ── Terraform plan (read-only, no changes applied yet) ───────────────────────
  plan:
    name: Terraform plan (prod)
    runs-on: ubuntu-latest
    needs: ci-gate
    outputs:
      ec2_instance_id: ${{ steps.tf.outputs.ec2_instance_id }}
      alb_dns_name:    ${{ steps.tf.outputs.alb_dns_name }}
      has_changes:     ${{ steps.tf_plan.outputs.has_changes }}
      plan_summary:    ${{ steps.tf_plan.outputs.summary }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_PROD }}
          aws-region:     ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.8"

      - name: Terraform init
        run: terraform init
        working-directory: ${{ env.TF_DIR }}

      - name: Terraform validate
        run: terraform validate
        working-directory: ${{ env.TF_DIR }}

      - name: Terraform plan
        id: tf_plan
        run: |
          set +e
          terraform plan -out=tfplan -input=false -detailed-exitcode \
            2>&1 | tee /tmp/tf-plan.txt
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          case "$EXIT_CODE" in
            0) echo "has_changes=false" >> "$GITHUB_OUTPUT"
               echo "summary=No infrastructure changes" >> "$GITHUB_OUTPUT" ;;
            2) echo "has_changes=true"  >> "$GITHUB_OUTPUT"
               SUMMARY=$(grep -E '^Plan:' /tmp/tf-plan.txt | head -1 \
                         || echo "Infrastructure changes detected")
               echo "summary=$SUMMARY" >> "$GITHUB_OUTPUT" ;;
            *) cat /tmp/tf-plan.txt; exit 1 ;;
          esac
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_app_db_password:       ${{ secrets.PROD_APP_DB_PASSWORD }}
          TF_VAR_warehouse_db_password: ${{ secrets.PROD_WAREHOUSE_DB_PASSWORD }}
          TF_VAR_acm_certificate_arn:   ${{ secrets.PROD_ACM_CERT_ARN }}

      - name: Read current Terraform outputs
        id: tf
        run: |
          echo "ec2_instance_id=$(terraform output -raw ec2_instance_id)" >> "$GITHUB_OUTPUT"
          echo "alb_dns_name=$(terraform output -raw alb_dns_name)"       >> "$GITHUB_OUTPUT"
        working-directory: ${{ env.TF_DIR }}

      # Terraform plan output is visible in the job summary before reviewers approve
      - name: Write plan to job summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## Terraform Plan — Prod

          **Result:** ${{ steps.tf_plan.outputs.summary }}

          <details><summary>Full plan output</summary>

          \`\`\`
          $(cat /tmp/tf-plan.txt)
          \`\`\`
          </details>
          EOF

  # ── Manual approval gate ──────────────────────────────────────────────────────
  # Reviewers see the plan summary above before clicking "Approve deployment"
  # in the "production" GitHub Environment settings.
  approve:
    name: Await production approval
    runs-on: ubuntu-latest
    needs: plan
    environment: production
    steps:
      - name: Approved
        run: |
          echo "Production deployment approved"
          echo "Infra plan : ${{ needs.plan.outputs.plan_summary }}"
          echo "Commit     : ${{ github.event.workflow_run.head_sha }}"

  # ── Terraform apply (only when the plan detected changes) ────────────────────
  apply:
    name: Terraform apply (prod)
    runs-on: ubuntu-latest
    needs: [plan, approve]
    if: needs.plan.outputs.has_changes == 'true'
    outputs:
      ec2_instance_id: ${{ steps.tf.outputs.ec2_instance_id }}
      alb_dns_name:    ${{ steps.tf.outputs.alb_dns_name }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_PROD }}
          aws-region:     ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.8"

      - name: Terraform init
        run: terraform init
        working-directory: ${{ env.TF_DIR }}

      # Re-plan with the same vars to obtain a fresh tfplan binary
      # (the plan job's artifact is not persisted across jobs by default)
      - name: Terraform plan (pre-apply)
        run: terraform plan -out=tfplan -input=false
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_app_db_password:       ${{ secrets.PROD_APP_DB_PASSWORD }}
          TF_VAR_warehouse_db_password: ${{ secrets.PROD_WAREHOUSE_DB_PASSWORD }}
          TF_VAR_acm_certificate_arn:   ${{ secrets.PROD_ACM_CERT_ARN }}

      - name: Terraform apply
        run: terraform apply -input=false tfplan
        working-directory: ${{ env.TF_DIR }}

      - name: Read Terraform outputs
        id: tf
        run: |
          echo "ec2_instance_id=$(terraform output -raw ec2_instance_id)" >> "$GITHUB_OUTPUT"
          echo "alb_dns_name=$(terraform output -raw alb_dns_name)"       >> "$GITHUB_OUTPUT"
        working-directory: ${{ env.TF_DIR }}

  # ── Deploy ─────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2 (prod)
    runs-on: ubuntu-latest
    # apply may be skipped when there are no infra changes — fall back to plan outputs
    needs: [plan, approve, apply]
    if: |
      always() &&
      needs.approve.result == 'success' &&
      (needs.apply.result == 'success' || needs.apply.result == 'skipped')

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_PROD }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Resolve instance ID and ALB (apply > plan)
        id: targets
        run: |
          EC2="${{ needs.apply.outputs.ec2_instance_id || needs.plan.outputs.ec2_instance_id }}"
          ALB="${{ needs.apply.outputs.alb_dns_name    || needs.plan.outputs.alb_dns_name }}"
          echo "ec2=$EC2" >> "$GITHUB_OUTPUT"
          echo "alb=$ALB" >> "$GITHUB_OUTPUT"

      - name: Make SSM helper executable
        run: chmod +x "${{ env.SSM_WAIT }}"

      - name: Upload docker-compose, env config, and deploy script
        env:
          INSTANCE: ${{ steps.targets.outputs.ec2 }}
        run: |
          ssm_upload() {
            local src="$1" dst="$2" timeout="${3:-60}"
            python3 -c "
          import json, base64, sys
          b64 = base64.b64encode(open(sys.argv[1], 'rb').read()).decode()
          print(json.dumps({'commands': [
              'mkdir -p $(dirname ' + sys.argv[2] + ')',
              f\"printf '%s' '{b64}' | base64 -d > {sys.argv[2]}\",
          ]}))
          " "$src" "$dst" > /tmp/ssm-params.json

            CMD_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE" \
              --document-name "AWS-RunShellScript" \
              --parameters "file:///tmp/ssm-params.json" \
              --output text --query "Command.CommandId")

            "${{ env.SSM_WAIT }}" "$CMD_ID" "$INSTANCE" "$timeout"
          }

          ssm_upload docker-compose.yml          /opt/insightflow/docker-compose.yml 60
          ssm_upload "${{ env.ENV_CONFIG }}"     /tmp/deploy.env                     30
          ssm_upload "${{ env.DEPLOY_SCRIPT }}"  /tmp/deploy.sh                      30

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["chmod +x /tmp/deploy.sh"]}' \
            --output text --query "Command.CommandId")
          "${{ env.SSM_WAIT }}" "$CMD_ID" "$INSTANCE" 15

      # Build on EC2 + canary pre-flight + zero-downtime swap + auto-rollback
      - name: Run zero-downtime deploy via SSM
        env:
          INSTANCE:   ${{ steps.targets.outputs.ec2 }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
          REPO_URL:   https://github.com/${{ github.repository }}.git
          GH_TOKEN:   ${{ secrets.GH_DEPLOY_TOKEN }}
        run: |
          TIMEOUT=$(grep '^DEPLOY_TIMEOUT=' "${{ env.ENV_CONFIG }}" | cut -d= -f2)

          python3 -c "
          import json, os
          cmd = ' '.join([
              f'COMMIT_SHA={os.environ[\"COMMIT_SHA\"]}',
              f'GITHUB_REPO_URL={os.environ[\"REPO_URL\"]}',
              f'GITHUB_TOKEN={os.environ[\"GH_TOKEN\"]}',
              'bash /tmp/deploy.sh',
          ])
          print(json.dumps({'commands': [cmd]}))
          " > /tmp/ssm-deploy.json

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE" \
            --document-name "AWS-RunShellScript" \
            --parameters "file:///tmp/ssm-deploy.json" \
            --output text --query "Command.CommandId")

          echo "SSM Command ID: $CMD_ID"
          "${{ env.SSM_WAIT }}" "$CMD_ID" "$INSTANCE" "$TIMEOUT"

      # End-to-end validation through the ALB with HTTPS
      - name: Smoke test via ALB (HTTPS)
        run: |
          ALB="${{ steps.targets.outputs.alb }}"
          for i in $(seq 1 18); do
            HTTP=$(curl -sf -o /dev/null -w "%{http_code}" \
              --max-time 10 "https://$ALB/api-docs/" 2>/dev/null || echo "000")
            echo "[$i/18] ALB → HTTP $HTTP"
            if [[ "$HTTP" == "200" ]]; then echo "Smoke test passed"; exit 0; fi
            sleep 10
          done
          echo "Smoke test failed — check CloudWatch Logs"
          exit 1

      - name: Record deployment metric and event
        if: always()
        run: |
          STATUS="${{ job.status }}"
          TS=$(date -u +%s)

          DIMS="Dimensions=[{Name=Environment,Value=prod},{Name=Status,Value=${STATUS}}]"
          aws cloudwatch put-metric-data \
            --namespace "InsightFlow/Deployments" \
            --metric-data "MetricName=DeploymentCount,Value=1,Unit=Count,${DIMS}" \
            --region "${{ env.AWS_REGION }}" || true

          # Write structured event to CloudWatch Logs for dashboard annotations.
          EVENT="{\"sha\":\"${{ github.event.workflow_run.head_sha }}\",\"status\":\"${STATUS}\",\"run\":\"${{ github.event.workflow_run.id }}\"}"
          aws logs put-log-events \
            --log-group-name  "/insightflow/prod/deployments" \
            --log-stream-name "github-actions" \
            --log-events      "timestamp=$(( TS * 1000 )),message=${EVENT}" \
            --region "${{ env.AWS_REGION }}" 2>/dev/null || true

  # ── Summary ───────────────────────────────────────────────────────────────────
  summary:
    name: Deployment summary
    runs-on: ubuntu-latest
    needs: [plan, deploy]
    if: always()
    steps:
      - name: Write job summary
        run: |
          STATUS="${{ needs.deploy.result }}"
          [[ "$STATUS" == "success" ]] && ICON="✅" || ICON="❌"
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## ${ICON} Prod Deployment — ${STATUS}

          | Field          | Value |
          |----------------|-------|
          | **Commit**     | \`${{ github.event.workflow_run.head_sha }}\` |
          | **Branch**     | \`main\` |
          | **Build**      | on EC2 — no container registry |
          | **Infra plan** | ${{ needs.plan.outputs.plan_summary }} |
          | **CI run**     | [#${{ github.event.workflow_run.id }}](${{ github.event.workflow_run.html_url }}) |
          EOF
