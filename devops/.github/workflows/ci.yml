name: CI Pipeline
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: insightflow_app
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: ./backend
      - name: Run migrations
        run: python manage.py migrate
        working-directory: ./backend
        env:
          DB_HOST: localhost
          DB_PORT: '5432'
          DB_NAME: insightflow_app
          DB_USER: postgres
          DB_PASSWORD: postgres
          DJANGO_SECRET_KEY: ci-test-secret-key
      - name: Run Django checks
        run: python manage.py check
        working-directory: ./backend
        env:
          DB_HOST: localhost
          DB_PORT: '5432'
          DB_NAME: insightflow_app
          DB_USER: postgres
          DB_PASSWORD: postgres
          DJANGO_SECRET_KEY: ci-test-secret-key

  data-engineering:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: data-engineering/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: ./data-engineering
      - name: Lint check
        run: python -m py_compile etl_pipeline.py create_star_schema.py sample_data.py config.py
        working-directory: ./data-engineering

  qa:
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: qa/api-tests/requirements.txt
      - name: Install QA dependencies
        run: pip install -r requirements.txt
        working-directory: ./qa/api-tests
      - name: Syntax check tests
        run: python -m py_compile tests/test_api.py conftest.py
        working-directory: ./qa/api-tests
