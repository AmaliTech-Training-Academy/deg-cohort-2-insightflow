name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit hooks
        run: pre-commit run --all-files
        env:
          SKIP: no-commit-to-branch

      - name: Install type stubs for mypy
        run: pip install mypy types-requests

      - name: Type check (mypy)
        run: mypy backend/apps backend/insightflow data-engineering qa/api-tests --config-file pyproject.toml

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          VERSION=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
            | grep '"tag_name"' | cut -d'"' -f4 | sed 's/v//')
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Scan for secrets
        run: gitleaks detect --source . --redact --verbose

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies
        run: |
          pip-audit -r backend/requirements.txt
          pip-audit -r data-engineering/requirements.txt
          pip-audit -r qa/api-tests/requirements.txt

  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: insightflow_app
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
      DB_NAME: insightflow_app
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: "5432"
      DEBUG: "False"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest-django pytest-cov
        working-directory: backend

      - name: Django system check
        run: python manage.py check
        working-directory: backend

      - name: Run migrations
        run: python manage.py migrate --noinput
        working-directory: backend

      - name: Run tests with coverage
        run: pytest --cov=apps --cov-report=term-missing --tb=short -v || [ $? -eq 5 ]
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: insightflow.settings

  data-engineering:
    name: ETL pipeline checks
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: data-engineering/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest
        working-directory: data-engineering

      - name: Syntax check
        run: python -m py_compile etl_pipeline.py create_star_schema.py sample_data.py config.py
        working-directory: data-engineering

      - name: Run ETL tests
        run: pytest --tb=short -v || echo "No tests yet — add tests under data-engineering/tests/"
        working-directory: data-engineering

  api-tests:
    name: API / integration tests
    runs-on: ubuntu-latest
    needs: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: insightflow_app
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
      DB_NAME: insightflow_app
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: "5432"
      DEBUG: "False"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend deps
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Install QA deps
        run: pip install -r requirements.txt
        working-directory: qa/api-tests

      - name: Run migrations and seed data
        run: |
          python manage.py migrate --noinput
          python manage.py seed_data
        working-directory: backend

      - name: Start backend server
        run: gunicorn insightflow.wsgi:application --bind 0.0.0.0:8000 --daemon --workers 2
        working-directory: backend

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:8000/api-docs/ && break
            echo "Waiting for server... ($i/15)"
            sleep 2
          done

      - name: Syntax check tests
        run: python -m py_compile tests/test_api.py conftest.py
        working-directory: qa/api-tests

      - name: Run API tests
        run: pytest --tb=short -v
        working-directory: qa/api-tests
        env:
          API_BASE_URL: http://localhost:8000

  docker:
    name: Docker build & scan
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t insightflow-backend:ci ./backend

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: insightflow-backend:ci
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true
