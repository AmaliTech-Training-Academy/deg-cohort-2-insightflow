name: Deploy → Dev

# ─────────────────────────────────────────────────────────────────────────────
# SOURCE OF TRUTH: devops/.github/workflows/deploy-dev.yml
# Mirror:          .github/workflows/deploy-dev.yml  (read by GitHub Actions)
# Keep both files identical. Edit here, then copy to .github/workflows/.
# ─────────────────────────────────────────────────────────────────────────────

# Triggers only after CI passes on dev.
# This guarantees every deploy has survived lint, tests, and security scans.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [dev]

concurrency:
  group: deploy-dev
  cancel-in-progress: false   # never abort an in-flight deploy

permissions:
  id-token: write   # OIDC → AWS assume-role
  contents: read

env:
  AWS_REGION:    ap-southeast-1
  TF_DIR:        devops/infra/environments/dev
  ENV_CONFIG:    devops/scripts/envs/dev.env
  DEPLOY_SCRIPT: devops/scripts/zero-downtime-deploy.sh
  SSM_WAIT:      devops/scripts/ssm-wait.sh

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── Guard ────────────────────────────────────────────────────────────────────
  ci-gate:
    name: CI gate
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - run: echo "CI passed on ${{ github.event.workflow_run.head_sha }} — starting dev deploy"

  # ── Infrastructure ────────────────────────────────────────────────────────────
  infrastructure:
    name: Terraform apply (dev)
    runs-on: ubuntu-latest
    needs: ci-gate
    outputs:
      ec2_instance_id: ${{ steps.tf.outputs.ec2_instance_id }}
      alb_dns_name:    ${{ steps.tf.outputs.alb_dns_name }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_DEV }}
          aws-region:     ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.8"

      - name: Terraform init
        run: terraform init
        working-directory: ${{ env.TF_DIR }}

      - name: Terraform validate
        run: terraform validate
        working-directory: ${{ env.TF_DIR }}

      - name: Terraform plan
        id: plan
        run: terraform plan -out=tfplan -input=false -detailed-exitcode
        working-directory: ${{ env.TF_DIR }}
        continue-on-error: true   # exit 2 = changes present, not an error
        env:
          TF_VAR_app_db_password:       ${{ secrets.DEV_APP_DB_PASSWORD }}
          TF_VAR_warehouse_db_password: ${{ secrets.DEV_WAREHOUSE_DB_PASSWORD }}

      - name: Abort on plan error
        if: steps.plan.outputs.exitcode == '1'
        run: exit 1

      - name: Terraform apply (only when changes present)
        if: steps.plan.outputs.exitcode == '2'
        run: terraform apply -input=false tfplan
        working-directory: ${{ env.TF_DIR }}

      - name: Read Terraform outputs
        id: tf
        run: |
          echo "ec2_instance_id=$(terraform output -raw ec2_instance_id)" >> "$GITHUB_OUTPUT"
          echo "alb_dns_name=$(terraform output -raw alb_dns_name)"       >> "$GITHUB_OUTPUT"
        working-directory: ${{ env.TF_DIR }}

  # ── Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2 (dev)
    runs-on: ubuntu-latest
    needs: infrastructure
    environment: dev

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_DEV }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Make SSM helper executable
        run: chmod +x "${{ env.SSM_WAIT }}"

      # Helper: base64-encode a local file and build the SSM parameters JSON.
      # Usage:  ssm_upload <local-file> <remote-path>
      # Output: writes /tmp/ssm-params.json then sends the command and waits.
      - name: Upload docker-compose, env config, and deploy script
        env:
          INSTANCE: ${{ needs.infrastructure.outputs.ec2_instance_id }}
        run: |
          ssm_upload() {
            local src="$1" dst="$2" timeout="${3:-60}"
            python3 -c "
          import json, base64, sys
          b64 = base64.b64encode(open(sys.argv[1], 'rb').read()).decode()
          print(json.dumps({'commands': [
              'mkdir -p $(dirname ' + sys.argv[2] + ')',
              f\"printf '%s' '{b64}' | base64 -d > {sys.argv[2]}\",
          ]}))
          " "$src" "$dst" > /tmp/ssm-params.json

            CMD_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE" \
              --document-name "AWS-RunShellScript" \
              --parameters "file:///tmp/ssm-params.json" \
              --output text --query "Command.CommandId")

            "${{ env.SSM_WAIT }}" "$CMD_ID" "$INSTANCE" "$timeout"
          }

          ssm_upload docker-compose.yml          /opt/insightflow/docker-compose.yml 60
          ssm_upload "${{ env.ENV_CONFIG }}"     /tmp/deploy.env                     30
          ssm_upload "${{ env.DEPLOY_SCRIPT }}"  /tmp/deploy.sh                      30

          # Make deploy script executable on the instance
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["chmod +x /tmp/deploy.sh"]}' \
            --output text --query "Command.CommandId")
          "${{ env.SSM_WAIT }}" "$CMD_ID" "$INSTANCE" 15

      # Build on EC2 + canary pre-flight + zero-downtime swap + auto-rollback
      - name: Run zero-downtime deploy via SSM
        id: ssm_deploy
        env:
          INSTANCE:   ${{ needs.infrastructure.outputs.ec2_instance_id }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
          REPO_URL:   https://github.com/${{ github.repository }}.git
          GH_TOKEN:   ${{ secrets.GH_DEPLOY_TOKEN }}
        run: |
          TIMEOUT=$(grep '^DEPLOY_TIMEOUT=' "${{ env.ENV_CONFIG }}" | cut -d= -f2)

          python3 -c "
          import json, os
          cmd = ' '.join([
              f'COMMIT_SHA={os.environ[\"COMMIT_SHA\"]}',
              f'GITHUB_REPO_URL={os.environ[\"REPO_URL\"]}',
              f'GITHUB_TOKEN={os.environ[\"GH_TOKEN\"]}',
              'bash /tmp/deploy.sh',
          ])
          print(json.dumps({'commands': [cmd]}))
          " > /tmp/ssm-deploy.json

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE" \
            --document-name "AWS-RunShellScript" \
            --parameters "file:///tmp/ssm-deploy.json" \
            --output text --query "Command.CommandId")

          echo "SSM Command ID: $CMD_ID"
          "${{ env.SSM_WAIT }}" "$CMD_ID" "$INSTANCE" "$TIMEOUT"

      # End-to-end validation through the ALB (proves DNS + TG + container)
      - name: Smoke test via ALB
        run: |
          ALB="${{ needs.infrastructure.outputs.alb_dns_name }}"
          for i in $(seq 1 12); do
            HTTP=$(curl -sf -o /dev/null -w "%{http_code}" \
              --max-time 10 "http://$ALB/api-docs/" 2>/dev/null || echo "000")
            echo "[$i/12] ALB → HTTP $HTTP"
            if [[ "$HTTP" == "200" ]]; then echo "Smoke test passed"; exit 0; fi
            sleep 10
          done
          echo "Smoke test failed — check CloudWatch Logs"
          exit 1

      - name: Record deployment metric
        if: always()
        run: |
          DIMS="Dimensions=[{Name=Environment,Value=dev},{Name=Status,Value=${{ job.status }}}]"
          aws cloudwatch put-metric-data \
            --namespace "InsightFlow/Deployments" \
            --metric-data "MetricName=DeploymentCount,Value=1,Unit=Count,${DIMS}" \
            --region "${{ env.AWS_REGION }}" || true

  # ── Summary ──────────────────────────────────────────────────────────────────
  summary:
    name: Deployment summary
    runs-on: ubuntu-latest
    needs: [infrastructure, deploy]
    if: always()
    steps:
      - name: Write job summary
        run: |
          STATUS="${{ needs.deploy.result }}"
          [[ "$STATUS" == "success" ]] && ICON="✅" || ICON="❌"
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## ${ICON} Dev Deployment — ${STATUS}

          | Field       | Value |
          |-------------|-------|
          | **Commit**  | \`${{ github.event.workflow_run.head_sha }}\` |
          | **Branch**  | \`dev\` |
          | **Build**   | on EC2 — no container registry |
          | **CI run**  | [#${{ github.event.workflow_run.id }}](${{ github.event.workflow_run.html_url }}) |
          | **ALB**     | http://${{ needs.infrastructure.outputs.alb_dns_name }} |
          EOF
